<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로모션 페이지 빌더</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <i class="ti ti-layout-board" aria-hidden="true"></i>
          <span>프로모션 빌더</span>
        </div>
        <div class="header-desc">초안을 붙여넣으면 Claude가 페이지 구성을 자동으로 분석해드려요</div>
      </div>
    </header>

    <main class="main">
      <div class="steps-col">

        <section class="step-section">
          <div class="step-header">
            <div class="step-num">1</div>
            <div>
              <div class="step-title">프로모션 초안 붙여넣기</div>
              <div class="step-desc">캠페인 목표, 혜택, 타겟 등 알고 있는 내용을 자유롭게 입력하세요</div>
            </div>
          </div>
          <textarea id="draft-input" placeholder="예시) 이번 여름 시즌 특가 프로모션입니다. 7월 한 달간 전 제품 30% 할인. 신규 가입 고객 추가 쿠폰 5,000원 증정. 인기 상품 TOP3 소개 및 실제 사용 후기 포함. 재고 소진 시 조기 종료될 수 있음을 강조..."></textarea>
        </section>

        <section class="step-section">
          <div class="step-header">
            <div class="step-num">2</div>
            <div>
              <div class="step-title">사용할 모듈 선택</div>
              <div class="step-desc">페이지에 들어갈 섹션을 골라주세요 (복수 선택 가능)</div>
            </div>
          </div>
          <div class="modules-grid" id="module-grid"></div>
        </section>

        <section class="step-section">
          <div class="step-header">
            <div class="step-num">3</div>
            <div>
              <div class="step-title">섹션 순서 조정</div>
              <div class="step-desc">드래그&드롭으로 원하는 순서로 배치하세요</div>
            </div>
          </div>
          <div class="sortable-list" id="order-list">
            <div class="empty-order">
              <i class="ti ti-stack-2" aria-hidden="true"></i>
              <span>모듈을 선택하면 여기에 나타나요</span>
            </div>
          </div>
        </section>

        <div class="action-row">
          <button class="btn-primary" id="analyze-btn" onclick="analyze()">
            <i class="ti ti-sparkles" aria-hidden="true"></i>
            Claude로 구성 분석하기
          </button>
          <button class="btn-ghost" onclick="reset()">
            <i class="ti ti-refresh" aria-hidden="true"></i>
            초기화
          </button>
        </div>

      </div>

      <div class="result-col" id="result-col">
        <div class="result-placeholder">
          <i class="ti ti-wand" aria-hidden="true"></i>
          <p>초안을 입력하고 분석하면<br>여기에 결과가 나타나요</p>
        </div>

        <div class="result-content" id="result-content" style="display:none">
          <div class="tab-row">
            <button class="tab active" onclick="switchTab('brief', this)">
              <i class="ti ti-file-description" aria-hidden="true"></i> 구성 브리프
            </button>
            <button class="tab" onclick="switchTab('figma', this)">
              <i class="ti ti-vector" aria-hidden="true"></i> Figma 프롬프트
            </button>
            <button class="tab" onclick="switchTab('notion', this)">
              <i class="ti ti-notebook" aria-hidden="true"></i> Notion 구조
            </button>
          </div>
          <div class="tab-body" id="tab-body"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
